name: Sync Fondos Mutuos

on:
  schedule:
    # Todos los días a las 6:00 AM UTC (3:00 AM Chile invierno / 2:00 AM verano)
    # Fintual actualiza sus datos cerca de la medianoche, así que a las 3 AM ya están listos
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # el sync completo toma ~40-60 min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync Fondos Mutuos → Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/sync-fondos.ts
